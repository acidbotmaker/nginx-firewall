{% extends "base.html" %}
{% block title %}Log in &middot; nginx-firewall{% endblock %}
{% block content %}
<section class="card narrow">
  <h1>Log in</h1>
  {% if error %}<p class="error">Invalid password.</p>{% endif %}
  <form method="post" action="/login">
    <label>Admin password
      <input type="password" name="password" autofocus required />
    </label>
    <button type="submit" class="primary">Log in</button>
  </form>
  <p class="muted small">
    First-run password is printed to the container logs:<br>
    <code>docker compose logs fastapi</code>
  </p>
</section>
{% endblock %}
