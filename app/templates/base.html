<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}nginx-firewall{% endblock %}</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">nginx-firewall</div>
    {% if request.session.get('admin') %}
    <nav>
      <a href="/" class="{% if active == 'ips' %}active{% endif %}">IP whitelist</a>
      <a href="/tokens" class="{% if active == 'tokens' %}active{% endif %}">API tokens</a>
      <form method="post" action="/logout" class="inline">
        <button type="submit" class="link">Log out</button>
      </form>
    </nav>
    {% endif %}
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
